<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body/content})}">
<body>
<content>

<div class="grid-4 mb16">
    <div class="card" style="padding:16px 20px">
        <div class="stat-label mb8">총 계정</div>
        <div class="stat-value accent" th:text="${userStats.total}"></div>
    </div>
    <div class="card" style="padding:16px 20px">
        <div class="stat-label mb8">활성</div>
        <div class="stat-value green" th:text="${userStats.active}"></div>
    </div>
    <div class="card" style="padding:16px 20px">
        <div class="stat-label mb8">MFA 미적용</div>
        <div class="stat-value yellow" th:text="${userStats.noMfa}"></div>
    </div>
    <div class="card" style="padding:16px 20px">
        <div class="stat-label mb8">비활성</div>
        <div class="stat-value dim" th:text="${userStats.offline}"></div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <div>
            <div class="card-title">사용자 목록</div>
            <div class="card-sub">접근 권한 관리</div>
        </div>
        <button class="btn-sm accent" onclick="openAddUserModal()">+ 사용자 추가</button>
    </div>
    <div class="table-wrap">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th><th>이름</th><th>역할</th><th>이메일</th>
                    <th>상태</th><th>MFA</th><th>마지막 로그인</th><th>권한</th><th>작업</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}" class="clickable-row"
                    th:data-dbid="${u.dbId}"
                    th:data-id="${u.id}" th:data-name="${u.name}"
                    th:data-role="${u.role}" th:data-email="${u.email}"
                    th:data-status="${u.status}" th:data-statuslabel="${u.statusLabel}"
                    th:data-statuscolor="${u.statusColor}"
                    th:data-mfa="${u.mfa}" th:data-login="${u.lastLogin}"
                    th:data-count="${u.loginCount}">
                    <td class="mono accent" th:text="${u.id}"></td>
                    <td style="font-weight:600" th:text="${u.name}"></td>
                    <td class="dim" th:text="${u.role}"></td>
                    <td class="dim" style="font-size:10px" th:text="${u.email}"></td>
                    <td>
                        <span style="display:flex;align-items:center;gap:5px;font-size:10px"
                              th:style="'display:flex;align-items:center;gap:5px;font-size:10px;color:' + ${u.statusColor}">
                            <span class="dot" th:style="'background:' + ${u.statusColor}"></span>
                            <span th:text="${u.statusLabel}"></span>
                        </span>
                    </td>
                    <td>
                        <span class="tag"
                              th:text="${u.mfa} ? '활성' : '미설정'"
                              th:style="${u.mfa} ? 'color:#06d6a0;background:#06d6a018;border-color:#06d6a044' : 'color:#ff3d5a;background:#ff3d5a18;border-color:#ff3d5a44'">
                        </span>
                    </td>
                    <td class="muted" th:text="${u.lastLogin}"></td>
                    <td>
                        <div style="display:flex;gap:4px;flex-wrap:wrap">
                            <span th:each="p : ${u.perms}" class="tag accent" th:text="${p}"></span>
                        </div>
                    </td>
                    <td>
                        <button class="btn-sm dim edit-btn">편집</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 편집 패널 -->
<div id="editPanel" class="card" style="display:none;margin-top:14px">
    <div class="card-header">
        <div class="card-title">사용자 편집</div>
        <button onclick="closeEdit()" class="btn-icon">×</button>
    </div>
    <div style="padding:16px 20px">
        <div id="editContent"></div>
    </div>
</div>

<!-- 사용자 추가 모달 -->
<div id="addUserModal" class="modal-overlay" style="display:none">
    <div class="card modal-box">
        <div class="card-header">
            <div class="card-title">사용자 추가</div>
            <button onclick="closeAddUserModal()" class="btn-icon">×</button>
        </div>
        <div style="padding:16px 20px">
            <div class="modal-field">
                <label>사용자명 *</label>
                <input type="text" id="newUsername" placeholder="예: jsmith"/>
            </div>
            <div class="modal-field">
                <label>이름</label>
                <input type="text" id="newName" placeholder="예: 홍길동"/>
            </div>
            <div class="modal-field">
                <label>이메일</label>
                <input type="email" id="newEmail" placeholder="예: user@beacon.local"/>
            </div>
            <div class="modal-field">
                <label>역할</label>
                <select id="newRole">
                    <option value="ROLE_ANALYST">ANALYST — 분석가</option>
                    <option value="ROLE_VIEWER">VIEWER — 읽기 전용</option>
                    <option value="ROLE_ADMIN">ADMIN — 관리자</option>
                </select>
            </div>
            <div class="modal-field">
                <label>초기 비밀번호 (미입력 시 자동 설정)</label>
                <input type="password" id="newPassword" placeholder="비밀번호"/>
            </div>
            <div class="detail-actions">
                <button class="btn-accent" onclick="submitAddUser()">추가</button>
                <button class="btn-sm dim" onclick="closeAddUserModal()">취소</button>
            </div>
        </div>
    </div>
</div>

<!-- 권한 수정 모달 -->
<div id="permModal" class="modal-overlay" style="display:none">
    <div class="card modal-box">
        <div class="card-header">
            <div class="card-title" id="permModalTitle">역할 수정</div>
            <button onclick="closePermModal()" class="btn-icon">×</button>
        </div>
        <div style="padding:16px 20px">
            <div class="modal-field">
                <label>역할 선택</label>
                <select id="permRoleSelect">
                    <option value="ROLE_ADMIN">ADMIN — 관리자</option>
                    <option value="ROLE_ANALYST">ANALYST — 분석가</option>
                    <option value="ROLE_VIEWER">VIEWER — 읽기 전용</option>
                </select>
            </div>
            <div class="detail-actions">
                <button class="btn-accent" id="permSaveBtn">저장</button>
                <button class="btn-sm dim" onclick="closePermModal()">취소</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="none">
document.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', e => {
        e.stopPropagation();
        const row = btn.closest('tr');
        const d = row.dataset;
        const dbId = d.dbid;
        document.getElementById('editPanel').style.display = 'block';
        const mfaWarn = d.mfa === 'false'
            ? `<div class="alert alert-warn" style="margin-top:10px">⚠ MFA가 설정되지 않았습니다. 즉시 설정을 권장합니다.</div>` : '';
        document.getElementById('editContent').innerHTML = `
            <div style="text-align:center;margin-bottom:16px">
                <div style="width:52px;height:52px;border-radius:50%;background:#1a2a3a;display:inline-flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700">${d.name[0]}</div>
            </div>
            ${[['이름',d.name],['ID',d.id],['역할',d.role],['이메일',d.email],['마지막 로그인',d.login],['총 로그인',d.count+'회']].map(([k,v])=>
                `<div class="detail-row"><span class="dim">${k}</span><span class="mono">${v}</span></div>`
            ).join('')}
            <div class="detail-actions" style="margin-top:12px">
                ${d.status === 'active'
                    ? `<button class="btn-danger" onclick="lockUser(${dbId})">계정 잠금</button>`
                    : `<button class="btn-success" onclick="unlockUser(${dbId})">계정 해제</button>`
                }
                <button class="btn-accent" onclick="openPermModal(${dbId}, '${d.name}', '${d.role}')">권한 수정</button>
            </div>
            ${mfaWarn}
        `;
        document.getElementById('editPanel').scrollIntoView({behavior:'smooth'});
    });
});

function closeEdit() { document.getElementById('editPanel').style.display = 'none'; }

function lockUser(dbId) {
    if (!confirm('정말로 이 계정을 잠금 처리하시겠습니까?')) return;
    fetch(`/api/users/${dbId}/lock`, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            showToast(data.message, data.success ? 'success' : 'error');
            if (data.success) { closeEdit(); location.reload(); }
        })
        .catch(() => showToast('오류가 발생했습니다', 'error'));
}

function unlockUser(dbId) {
    if (!confirm('이 계정의 잠금을 해제하시겠습니까?')) return;
    fetch(`/api/users/${dbId}/unlock`, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            showToast(data.message, data.success ? 'success' : 'error');
            if (data.success) { closeEdit(); location.reload(); }
        })
        .catch(() => showToast('오류가 발생했습니다', 'error'));
}

function openPermModal(dbId, name, currentRole) {
    document.getElementById('permModalTitle').textContent = name + '의 역할 수정';
    document.getElementById('permRoleSelect').value = currentRole;
    document.getElementById('permSaveBtn').onclick = () => savePermissions(dbId);
    document.getElementById('permModal').style.display = 'flex';
}

function closePermModal() { document.getElementById('permModal').style.display = 'none'; }

function savePermissions(dbId) {
    const role = document.getElementById('permRoleSelect').value;
    fetch(`/api/users/${dbId}/role`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role })
    })
    .then(r => r.json())
    .then(data => {
        showToast(data.message, data.success ? 'success' : 'error');
        if (data.success) { closePermModal(); location.reload(); }
    })
    .catch(() => showToast('오류가 발생했습니다', 'error'));
}

function openAddUserModal() {
    document.getElementById('addUserModal').style.display = 'flex';
    document.getElementById('newUsername').value = '';
    document.getElementById('newName').value = '';
    document.getElementById('newEmail').value = '';
    document.getElementById('newPassword').value = '';
}

function closeAddUserModal() { document.getElementById('addUserModal').style.display = 'none'; }

function submitAddUser() {
    const body = {
        username: document.getElementById('newUsername').value.trim(),
        name:     document.getElementById('newName').value.trim(),
        email:    document.getElementById('newEmail').value.trim(),
        role:     document.getElementById('newRole').value,
        password: document.getElementById('newPassword').value
    };
    fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    })
    .then(r => r.json())
    .then(data => {
        showToast(data.message, data.success ? 'success' : 'error');
        if (data.success) { closeAddUserModal(); location.reload(); }
    })
    .catch(() => showToast('오류가 발생했습니다', 'error'));
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        closeAddUserModal();
        closePermModal();
    }
});
</script>

</content>
</body>
</html>
