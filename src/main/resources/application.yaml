server:
  port: 8080
  ssl:
    # 기본 true: https:// 접속. 인증서가 준비되지 않았다면 SERVER_SSL_ENABLED=false 로 일시 전환
    enabled: ${SERVER_SSL_ENABLED:true}
    key-store: classpath:keystore.p12
    # mkcert -pkcs12 기본 비밀번호는 changeit
    key-store-password: ${SERVER_SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: ${SERVER_SSL_KEY_ALIAS:1}

spring:
  application:
    name: beacon

  datasource:
    url: ${BEACON_DB_URL:jdbc:mysql://localhost:3306/beacon?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${BEACON_DB_USERNAME:root}
    password: ${BEACON_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      data-source-properties:
        # MySQL: JDBC 배치(INSERT 다건) 병합. saveAll + batch_size와 함께 쓰면 N회 왕복을 줄인다.
        rewriteBatchedStatements: true

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: true

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

jwt:
  # 기본값 없음 — 반드시 환경변수 BEACON_JWT_SECRET 으로 주입해야 한다.
  # 값이 없거나 32바이트 미만이면 JwtTokenProvider.validateSecret()이 시작 시 예외를 던진다.
  secret: ${BEACON_JWT_SECRET}
  expiration: ${BEACON_JWT_EXPIRATION:86400000}

ml:
  python:
    service:
      url: ${ML_SERVICE_URL:http://localhost:5000}

# Llama 3B (Ollama) 어시스턴트 설정
ai:
  ollama:
    # Ollama 데몬 엔드포인트. 기본값은 로컬 (Ollama 표준 포트 11434).
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    # 사용할 모델 태그. 기본은 Llama 3.2 3B (한국어 지원, 약 2GB).
    model: ${OLLAMA_MODEL:llama3.2:3b}
    # 기본 false 권장: 미설치 시 서버에서 외부 스크립트를 직접 실행하지 않도록 차단.
    auto-install: ${OLLAMA_AUTO_INSTALL:false}
    # 자동 설치를 실제로 허용할지 여부 (운영 환경은 false 유지 권장).
    allow-auto-install: ${OLLAMA_ALLOW_AUTO_INSTALL:false}
    # 설치가 완료된 환경에서는 서버 시작 시 모델 준비를 자동으로 시작한다.
    # (자동 설치는 allow-auto-install=false 이므로 여전히 비활성)
    auto-bootstrap: ${OLLAMA_AUTO_BOOTSTRAP:true}
    docker:
      # Docker Ollama 컨테이너를 우선 사용한다.
      enabled: ${OLLAMA_DOCKER_ENABLED:true}
      # 서버 시작 시 컨테이너를 자동으로 시작/생성한다.
      auto-start: ${OLLAMA_DOCKER_AUTO_START:true}
      # 재사용할 컨테이너 이름
      container-name: ${OLLAMA_DOCKER_CONTAINER_NAME:beacon-ollama}
      # 사용할 Ollama 이미지
      image: ${OLLAMA_DOCKER_IMAGE:ollama/ollama:latest}
      # 비워두면 기본값(USER_HOME/.ollama:/root/.ollama)을 사용한다.
      volume: ${OLLAMA_DOCKER_VOLUME:}

syslog:
  port: ${SYSLOG_PORT:514}
  protocol: UDP

suricata:
  eve:
    enabled: ${SURICATA_EVE_ENABLED:false}
    path: ${SURICATA_EVE_PATH:C:\\Program Files\\Suricata\\log\\eve.json}
    poll-interval-ms: ${SURICATA_EVE_POLL_MS:500}

logging:
  level:
    com.example.beacon: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}

# 방화벽 B채널(명령 큐)·롱폴
beacon:
  firewall:
    # DUAL: A 스냅샷 + B 푸시 큐 | PULL_ONLY: B 큐 적재 생략(에이전트는 주기 A만으로 정합 가능)
    channel-mode: ${BEACON_FIREWALL_CHANNEL_MODE:DUAL}
    command-retention-days: ${BEACON_FIREWALL_CMD_RETENTION_DAYS:14}
    long-poll:
      core-pool-size: ${BEACON_FIREWALL_LP_CORE:16}
      max-pool-size: ${BEACON_FIREWALL_LP_MAX:64}
      queue-capacity: ${BEACON_FIREWALL_LP_QUEUE:500}
