<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>로그인 | 비콘</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="login-body">
<div class="login-wrap">
    <div class="login-card">
        <div class="login-card-grid">
            <section class="login-intro">
                <span class="login-kicker">비콘 관제센터</span>
                <h1>작은 이상 신호가 사고로 번지기 전에 먼저 차단하세요.</h1>
                <p>위협 가시성, 엔드포인트 수집 정보, 방화벽 대응, 운영자 작업 흐름을 하나의 관제 화면에서 통합 관리합니다.</p>
                <div class="login-feature-list">
                    <div class="login-feature"><i class="fas fa-shield-virus"></i><span>실시간 위협 연계 분석</span></div>
                    <div class="login-feature"><i class="fas fa-network-wired"></i><span>네트워크 및 단말 맥락 파악</span></div>
                    <div class="login-feature"><i class="fas fa-lock"></i><span>운영자 권한 기반 접근</span></div>
                </div>
            </section>

            <section class="login-panel">
                <div class="login-logo">
                    <div class="logo-icon-lg">
                        <i class="fas fa-shield-halved"></i>
                    </div>
                    <div class="login-title">BEACON</div>
                    <div class="login-sub">보안 관제 콘솔</div>
                </div>

                <div th:if="${param.error}" class="alert alert-error">
                    <i class="fas fa-circle-exclamation"></i> 아이디 또는 비밀번호가 올바르지 않습니다.
                </div>
                <div th:if="${param.logout}" class="alert alert-info">
                    <i class="fas fa-circle-info"></i> 안전하게 로그아웃되었습니다.
                </div>

                <form th:action="@{/login}" method="post" class="login-form">
                    <div class="form-group">
                        <label><i class="fas fa-user-shield"></i> 운영자 아이디</label>
                        <input type="text" name="username" placeholder="운영자 ID 입력" required autocomplete="username"/>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-key"></i> 비밀번호</label>
                        <input type="password" name="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password"/>
                    </div>
                    <button type="submit" class="btn-login">
                        관제 화면 들어가기 <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <!-- 보안 경고 힌트 제거됨 (운영 환경 모드) -->
            </section>
        </div>
    </div>
</div>
</body>
</html>
