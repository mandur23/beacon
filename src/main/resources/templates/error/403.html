<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>접근 권한 없음 · Beacon</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg);
            text-align: center;
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            color: var(--surface2);
            letter-spacing: -0.04em;
            text-shadow: 0 0 60px rgba(255,140,66,.2);
        }
        .error-code span { color: var(--orange); }
        .error-title {
            font-size: 20px;
            color: #e0eaf8;
            margin-top: 14px;
        }
        .error-desc {
            font-size: 13px;
            color: var(--dim);
            margin-top: 8px;
            max-width: 460px;
            line-height: 1.6;
            margin-left: auto;
            margin-right: auto;
        }
        .error-countdown {
            margin-top: 16px;
            font-size: 13px;
            color: var(--muted);
        }
        .error-actions {
            margin-top: 28px;
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .error-actions .btn-accent {
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div class="error-page">
    <div class="error-code">4<span>0</span>3</div>
    <h1 class="error-title">이 페이지에 접근할 권한이 없습니다</h1>
    <p class="error-desc">
        현재 계정 권한으로는 요청한 기능을 사용할 수 없습니다.
        관리자에게 권한을 요청하거나 메인 페이지로 이동해 주세요.
    </p>
    <p class="error-countdown">
        <span id="countdown">10</span>초 후 메인 페이지로 이동합니다.
    </p>
    <div class="error-actions">
        <a th:href="@{/dashboard}" class="btn-accent">메인 페이지로 이동</a>
    </div>
</div>

<script>
    (function () {
        var remaining = 10;
        var countdownEl = document.getElementById('countdown');
        var timerId = setInterval(function () {
            remaining -= 1;
            if (countdownEl) {
                countdownEl.textContent = String(remaining);
            }
            if (remaining <= 0) {
                clearInterval(timerId);
                window.location.href = '/dashboard';
            }
        }, 1000);
    })();
</script>
</body>
</html>
