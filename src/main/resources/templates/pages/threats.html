<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body/content})}">
<body>
<content>

<div class="grid-metrics mb24">
    <th:block th:each="entry : ${severityCounts}">
        <a th:href="@{/threats(severity=${entry.key}, date=${selectedDate}, search=${search}, agentName=${currentAgent}, source=${currentSource}, riskOnly=${riskOnly})}"
           class="premium-glass metric-box kpi-interactive"
           th:classappend="${currentSeverity == entry.key} ? ' active' : ''">
            <div class="metric-header">
                <span class="metric-label" th:text="${entry.key.toUpperCase()}">LEVEL</span>
                <i th:if="${currentSeverity == entry.key}" data-lucide="check-circle-2" size="14" style="color:var(--accent);"></i>
            </div>
            <div class="metric-val glow-text" th:text="${entry.value}">0</div>
            <div class="metric-sub" th:text="'탐지 ' + ${entry.key}">탐지 현황</div>
        </a>
    </th:block>
</div>

<!-- Command Bar Filter -->
<div class="premium-glass command-bar-wrapper mb24" style="display:flex; flex-direction:column; gap:12px;">
    <form th:action="@{/threats}" method="get" id="filterForm" class="command-bar">
        <input type="hidden" name="severity" th:value="${currentSeverity}"/>
        <input type="hidden" name="page" value="0"/>

        <div class="cb-search">
            <i data-lucide="search" size="16"></i>
            <input type="text" name="search" id="searchInput" th:value="${search}" placeholder="SPL 쿼리 또는 키워드 입력 (예: IP, 포트, 공격 유형)..."/>
        </div>
        
        <div class="cb-filters">
            <div class="cb-pill">
                <i data-lucide="calendar" size="12"></i>
                <input type="date" name="date" th:value="${selectedDate}" onchange="this.form.submit()"/>
                <button type="button" th:if="${selectedDate != null}" onclick="clearDate()" class="cb-clear">&times;</button>
            </div>
            
            <div class="cb-pill">
                <i data-lucide="monitor" size="12"></i>
                <select name="agentName" onchange="this.form.submit()">
                    <option value="all" th:selected="${currentAgent == 'all'}">전체 자산</option>
                    <option th:each="name : ${agentList}" th:value="${name}" th:text="${name}" th:selected="${currentAgent == name}"></option>
                </select>
            </div>

            <div class="cb-pill">
                <i data-lucide="shield" size="12"></i>
                <select name="source" onchange="this.form.submit()">
                    <option value="all" th:selected="${currentSource == 'all'}">모든 출처</option>
                    <option value="AGENT" th:selected="${currentSource == 'AGENT'}">Beacon Agent (Endpoint)</option>
                    <option value="WAZUH" th:selected="${currentSource == 'WAZUH'}">Wazuh (HIDS)</option>
                    <option value="SURICATA" th:selected="${currentSource == 'SURICATA'}">Suricata (Network IDS)</option>
                </select>
            </div>

            <label class="cb-pill cb-checkbox">
                <input type="checkbox" name="riskOnly" th:checked="${riskOnly}" onchange="this.form.submit()"/>
                <span>고위험</span>
            </label>
        </div>
    </form>
    
    <!-- 포렌식 프리셋 퀵 필터 -->
    <div class="preset-filters-bar" style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
        <span style="font-size: 11px; color: var(--dim); display: inline-flex; align-items: center; gap: 4px; font-weight: 700; margin-right: 8px;">
            <i data-lucide="radar" size="12" style="color:var(--accent);"></i> 포렌식 퀵 프리셋:
        </span>
        <button type="button" class="btn-quick-cmd" onclick="applyPresetFilter('portscan')">포트 스캔 탐지</button>
        <button type="button" class="btn-quick-cmd" onclick="applyPresetFilter('brute')">비정상 Brute Force</button>
        <button type="button" class="btn-quick-cmd" onclick="applyPresetFilter('SURICATA')">Suricata 탐지망</button>
        <button type="button" class="btn-quick-cmd" onclick="applyPresetFilter('critical')">미결 위급 로그</button>
        <button type="button" class="btn-quick-cmd" onclick="applyPresetFilter('clear')">초기화</button>
    </div>
</div>

<div class="threat-master-layout">
    <div class="premium-glass feed-container">
        <div class="card-header border-b">
            <div>
                <div class="card-title glow-text" style="font-size: 15px;">이벤트 탐지 스트림</div>
                <div class="card-sub" th:text="${selectedDate == null ? '전체 기간 통합 데이터' : #temporals.format(selectedDate, 'yyyy-MM-dd')} + ' | ' + ${totalItems} + ' Events'">총 건수</div>
            </div>
            <div class="feed-pagination">
                <a th:if="${currentPage > 0}" th:href="@{/threats(severity=${currentSeverity}, date=${selectedDate}, search=${search}, agentName=${currentAgent}, source=${currentSource}, riskOnly=${riskOnly}, page=${currentPage - 1})}" class="pg-btn"><i data-lucide="chevron-left" size="14"></i></a>
                <span class="mono dim">PAGE [[${currentPage} + 1]] / [[${totalPages == 0 ? 1 : totalPages}]]</span>
                <a th:if="${currentPage + 1 < totalPages}" th:href="@{/threats(severity=${currentSeverity}, date=${selectedDate}, search=${search}, agentName=${currentAgent}, source=${currentSource}, riskOnly=${riskOnly}, page=${currentPage + 1})}" class="pg-btn"><i data-lucide="chevron-right" size="14"></i></a>
            </div>
        </div>

        <div class="scroll-body event-feed-list" style="overflow-y: auto;">
            <div th:each="e : ${events}" class="threat-feed-item clickable-row"
                 th:classappend="${e.severity == 'critical'} ? ' urgent-item' : ''"
                 th:data-id="${e.dbId}"
                 th:data-evt-id="${e.id}"
                 th:data-src-ip="${e.sourceIp}"
                 th:data-dst-ip="${e.destinationIp}"
                 th:data-type="${e.type}"
                 th:data-proto="${e.protocol}"
                 th:data-port="${e.port}"
                 th:data-status="${e.status}"
                 th:data-desc="${e.description}"
                 th:data-agent="${e.agentName}"
                 th:data-meta="${e.metadata}"
                 th:data-time="${e.time}"
                 th:data-source="${e.source}"
                 th:data-severity-color="${e.severityColor}"
                 onclick="openThreatInspector(this)">
                
                <div class="t-line" th:style="'background:' + ${e.severityColor}"></div>
                
                <div class="t-content">
                    <div class="t-header">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span class="t-type" th:text="${e.type}">탐지 유형</span>
                            <span class="badge" th:style="'font-size:9px; padding:2px 6px; background:'+${e.severityColor}+'1a; color:'+${e.severityColor}+'; border:1px solid '+${e.severityColor}+'33;'" th:text="${e.severityLabel}">위험도</span>
                        </div>
                        <span class="t-time mono" th:text="${e.time}">00:00:00</span>
                    </div>
                    
                    <div class="t-flow-visual">
                        <div class="flow-node attacker">
                            <i data-lucide="ghost" size="12" th:if="${e.source == 'SURICATA'}"></i>
                            <i data-lucide="crosshair" size="12" th:if="${e.source != 'SURICATA'}"></i>
                            <span class="mono" th:text="${e.sourceIp}">192.168.x.x</span>
                        </div>
                        <div class="flow-arrow">
                            <span class="flow-proto" th:text="${e.protocol}">TCP</span>
                            <i data-lucide="arrow-right" size="12" class="flow-anim"></i>
                        </div>
                        <div class="flow-node target">
                            <i data-lucide="server" size="12"></i>
                            <span class="mono" th:text="${e.agentName} + ':' + ${e.port}">Agent:00</span>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(events)}" class="empty-state">
                <i data-lucide="filter" size="48" style="opacity: 0.3;"></i>
                <p>필터 조건에 일치하는 이벤트 스트림이 없습니다.</p>
                <small>현재 선택된 날짜나 에이전트에 위협이 탐지되지 않았습니다.</small>
            </div>
        </div>
    </div>

    <!-- Inspector -->
    <div id="threatInspector" class="premium-glass inspector-panel">
        <div class="empty-inspector">
            <div class="radar-scan"></div>
            <i data-lucide="scan-face" size="48" style="color:var(--dim); opacity:0.5; margin-bottom:16px;"></i>
            <p>좌측 스트림에서 이벤트를 선택하면,<br>상세 패킷 정보와 위협 인텔리전스 콘솔이 활성화됩니다.</p>
        </div>
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
function clearDate() {
    const form = document.getElementById('filterForm');
    form.querySelector('input[name="date"]').value = '';
    form.submit();
}

function applyPresetFilter(presetType) {
    const form = document.getElementById('filterForm');
    const searchInput = document.getElementById('searchInput');
    const sourceSelect = form.querySelector('select[name="source"]');
    const severityInput = form.querySelector('input[name="severity"]');
    const riskOnlyCheckbox = form.querySelector('input[name="riskOnly"]');

    if (presetType === 'portscan') {
        searchInput.value = 'portscan';
        sourceSelect.value = 'all';
        riskOnlyCheckbox.checked = false;
    } else if (presetType === 'brute') {
        searchInput.value = 'brute';
        sourceSelect.value = 'all';
        riskOnlyCheckbox.checked = false;
    } else if (presetType === 'SURICATA') {
        searchInput.value = '';
        sourceSelect.value = 'SURICATA';
        riskOnlyCheckbox.checked = false;
    } else if (presetType === 'critical') {
        searchInput.value = '';
        sourceSelect.value = 'all';
        severityInput.value = 'critical';
        riskOnlyCheckbox.checked = true;
    } else if (presetType === 'clear') {
        searchInput.value = '';
        sourceSelect.value = 'all';
        severityInput.value = 'all';
        riskOnlyCheckbox.checked = false;
        form.querySelector('input[name="date"]').value = '';
    }
    form.submit();
}

function syntaxHighlight(jsonStr) {
    try {
        const obj = JSON.parse(jsonStr);
        let formatted = JSON.stringify(obj, null, 2);
        formatted = formatted.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return formatted.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
            let cls = 'hl-number';
            if (/^"/.test(match)) {
                if (/:$/.test(match)) cls = 'hl-key';
                else cls = 'hl-string';
            } else if (/true|false/.test(match)) {
                cls = 'hl-boolean';
            } else if (/null/.test(match)) {
                cls = 'hl-null';
            }
            return '<span class="' + cls + '">' + match + '</span>';
        });
    } catch(e) {
        return jsonStr; // fallback
    }
}

function openThreatInspector(el) {
    // 1. 선택된 아이템 하이라이트 변경
    document.querySelectorAll('.threat-feed-item').forEach(item => item.classList.remove('active-item'));
    el.classList.add('active-item');

    // 2. 패널 데이터 추출
    const d = el.dataset;
    const inspector = document.getElementById('threatInspector');
    
    // 3. XSS 방지
    const escapeHtml = (text) => {
        const div = document.createElement('div');
        div.textContent = text || '';
        return div.innerHTML;
    };
    
    // 4. 상태 배지
    let statusClass = 'warning';
    let statusLabel = '미조치';
    if (d.status === 'blocked' || d.status === 'resolved') {
        statusClass = 'success'; statusLabel = '차단됨';
    } else if (d.status === 'investigating') {
        statusClass = 'warning'; statusLabel = '조사 중';
    } else if (d.status === 'whitelisted') {
        statusClass = 'success'; statusLabel = '예외됨';
    }

    const highlightedJson = syntaxHighlight(d.meta || '{}');

    const safeHtml = `
        <div class="card-header border-b" style="justify-content:space-between; height: 53px;">
            <div class="card-title">Threat Forensics Intel</div>
            <button onclick="closeInspector()" class="icon-btn" style="background:transparent;"><i data-lucide="x" size="16"></i></button>
        </div>
        
        <div class="scroll-body p24" style="overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:16px; padding: 20px;">
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                <div>
                    <div style="font-size:10px; color:var(--dim); margin-bottom:4px; font-weight:700; letter-spacing:0.05em;">CORRELATION ID</div>
                    <div class="mono glow-text" style="font-size:20px; color:${escapeHtml(d.severityColor)};">${escapeHtml(d.evtId)}</div>
                </div>
                <span class="badge ${statusClass}">${statusLabel}</span>
            </div>
            
            <div class="inspector-box network-vis" style="padding: 12px;">
                <div class="section-label mb12"><i data-lucide="git-merge" size="12"></i> Attack Vector Path</div>
                <div class="vis-topology">
                    <div class="vis-node source-node">
                        <i data-lucide="${d.source === 'SURICATA'? 'webhook' : 'crosshair'}" size="18"></i>
                        <span class="mono" style="font-size:11px; margin-top:4px;">${escapeHtml(d.srcIp)}</span>
                        <div class="pulse-ring"></div>
                    </div>
                    <div class="vis-edge">
                        <div class="edge-line"></div>
                        <span class="edge-label mono" style="font-size:9px;">${escapeHtml(d.proto)}:${escapeHtml(d.port)}</span>
                    </div>
                    <div class="vis-node dest-node">
                        <i data-lucide="server" size="18"></i>
                        <span class="mono" style="font-size:11px; margin-top:4px;">${escapeHtml(d.dstIp)}</span>
                        <span style="font-size: 9px; color: var(--dim);">${escapeHtml(d.agent)}</span>
                    </div>
                </div>
            </div>

            <div class="inspector-box ai-analysis" style="padding: 12px;">
                <div class="section-label mb8"><i data-lucide="info" size="12"></i> Signature Description</div>
                <p style="font-size:12px; line-height:1.6; color:#ccc; margin:0;">${escapeHtml(d.desc) || '설명이 존재하지 않습니다.'}</p>
            </div>
            
            <div class="inspector-box ai-analysis" style="padding: 12px; border-color: rgba(255, 209, 102, 0.2);">
                <div class="section-label mb8" style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:#ffd166;"><i data-lucide="sparkles" size="12"></i> AI Incident Forensic Analyst</span>
                    <button class="btn-quick-cmd" id="aiReportBtn" data-action="ai-report" style="padding:2px 6px; font-size:10px; border-color:#ffd166; color:#ffd166;">🪄 보고서 생성</button>
                </div>
                <div id="aiForensicContainer" style="font-size:11px; line-height:1.6; color:#ccc; min-height: 40px; display:flex; flex-direction:column; justify-content:center;">
                    <p style="font-size:11px; color:var(--dim); font-style:italic; margin:0; text-align:center;">[보고서 생성] 클릭 시 AI가 패킷을 역추적하여 대응 대책을 스트리밍 출력합니다.</p>
                </div>
            </div>
            
            <div class="inspector-box raw-payload" style="padding: 12px;">
                <div class="section-label mb8" style="display:flex; justify-content:space-between; align-items:center;">
                    <span><i data-lucide="file-json" size="12"></i> Raw Packet Metadata</span>
                    <button class="icon-btn" data-action="copy" title="복사" style="width:20px;height:20px;padding:0;"><i data-lucide="copy" size="11"></i></button>
                </div>
                <pre class="json-viewer" id="jsonPayload">${highlightedJson}</pre>
            </div>
        </div>
        
        <div class="inspector-footer" style="padding: 14px 20px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--glass-border);">
            <div style="display:flex; gap:6px; width:100%; margin-bottom:8px;">
                <button class="btn-danger" data-action="block" style="flex:1; font-weight:700; font-size:11px; padding: 10px 0; display:flex; align-items:center; justify-content:center; gap:4px;">
                    <i data-lucide="shield-ban" size="12"></i> IP 차단
                </button>
                <button class="btn-warning" data-action="investigate" style="flex:1; font-weight:700; font-size:11px; padding: 10px 0; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.4); color:#f59e0b; cursor:pointer; border-radius:6px; display:flex; align-items:center; justify-content:center; gap:4px;">
                    <i data-lucide="search" size="12"></i> 조사 개시
                </button>
                <button class="btn-glass" data-action="whitelist" style="flex:1; font-size:11px; padding: 10px 0; display:flex; align-items:center; justify-content:center; gap:4px;">
                    <i data-lucide="check" size="12"></i> 예외 등록
                </button>
            </div>
            <button class="btn-glass w100" data-action="isolate" style="font-size:11px; padding: 10px 0; border-color:var(--danger); color:var(--danger); font-weight:700; display:flex; align-items:center; justify-content:center; gap:4px; margin-top:4px;">
                <i data-lucide="radio" size="12"></i> ⚠️ 에이전트 망 분리 (Isolate Host)
            </button>
        </div>
    `;
    
    inspector.innerHTML = DOMPurify.sanitize(safeHtml);

    const bind = (selector, handler) => {
        const node = inspector.querySelector(selector);
        if (node) node.addEventListener('click', handler);
    };
    bind('[data-action="copy"]', copyPayload);
    bind('[data-action="ai-report"]', () => generateForensicReport(d.id));
    bind('[data-action="block"]', () => blockIp(d.id, d.srcIp));
    bind('[data-action="investigate"]', () => investigateThreat(d.id));
    bind('[data-action="whitelist"]', () => whitelistIp(d.id));
    bind('[data-action="isolate"]', () => isolateAgent(d.agent));

    if (typeof lucide !== 'undefined') lucide.createIcons();
}

function closeInspector() {
    const inspector = document.getElementById('threatInspector');
    inspector.innerHTML = `<div class="empty-inspector"><div class="radar-scan"></div><i data-lucide="scan-face" size="48" style="color:var(--dim); opacity:0.5; margin-bottom:16px;"></i><p>좌측 스트림에서 이벤트를 선택하면,<br>상세 패킷 정보와 위협 인텔리전스 콘솔이 활성화됩니다.</p></div>`;
    document.querySelectorAll('.threat-feed-item').forEach(item => item.classList.remove('active-item'));
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

async function generateForensicReport(dbId) {
    const container = document.getElementById('aiForensicContainer');
    const btn = document.getElementById('aiReportBtn');
    if (!container || !btn) return;

    btn.disabled = true;
    btn.innerText = '보고서 분석 중...';
    container.innerHTML = `<div style="text-align:center; padding:10px; color:var(--dim);"><i data-lucide="loader" class="spin" size="12" style="vertical-align:middle; margin-right:4px;"></i> AI가 패킷 이상 패턴을 분석하고 있습니다...</div>`;
    if (typeof lucide !== 'undefined') lucide.createIcons();

    const activeRow = document.querySelector(`.threat-feed-item[data-id="${dbId}"]`);
    if (!activeRow) {
        showToast('이벤트 정보를 수집할 수 없습니다.', 'danger');
        btn.disabled = false;
        btn.innerText = '🪄 보고서 생성';
        return;
    }

    const d = activeRow.dataset;
    const prompt = `[위협 포렌식 분석 요청]\n- 탐지 위협: ${d.type}\n- 상세 설명: ${d.desc}\n- 네트워크 정보: 출발지 ${d.srcIp} -> 목적지 ${d.dstIp} (프로토콜: ${d.proto}, 포트: ${d.port})\n- 수집 센서: ${d.source}\n- 패킷 메타데이터: ${d.meta}\n이 이벤트를 정밀 분석하여 관제사 보고서 형식으로 작성해줘. 1. 공격 기법 요약, 2. 비즈니스 자산 영향도, 3. 추천 방화벽 대응 규칙을 150자 내로 명확히 작성해줘.`;

    try {
        const res = await fetch('http://' + window.location.hostname + ':5001/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: prompt })
        });
        
        if (!res.ok) throw new Error('AI Server offline');
        
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullText = "";
        
        container.innerHTML = `<div id="aiForensicText" style="padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px dashed rgba(255, 209, 102, 0.3); color:#fff; min-height: 80px; font-family: var(--font-mono); font-size:11px; white-space:pre-wrap; overflow-y:auto; max-height:160px; line-height:1.5; text-align:left;"></div>`;
        const textContainer = document.getElementById('aiForensicText');
        
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            fullText += chunk;
            textContainer.innerText = fullText;
            container.scrollTop = container.scrollHeight;
        }
        btn.innerText = '✓ 분석 완료';
    } catch (e) {
        container.innerHTML = `<div style="font-size:11px; color:var(--dim); text-align:center; padding:10px;"><i data-lucide="shield-alert" size="12" style="vertical-align:middle; margin-right:4px; color:var(--warning);"></i> AI 분석 데몬이 오프라인 상태입니다. (Port 5001)</div>`;
        if (typeof lucide !== 'undefined') lucide.createIcons();
        btn.disabled = false;
        btn.innerText = '🪄 보고서 생성';
    }
}

async function investigateThreat(dbId) {
    try {
        const res = await fetch(`/api/threats/${dbId}/investigate`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
            showToast(data.message || '해당 침해 이벤트 조사를 개시했습니다.', 'warning');
            const activeRow = document.querySelector(`.threat-feed-item[data-id="${dbId}"]`);
            if (activeRow) activeRow.dataset.status = 'investigating';
            const statusBadge = document.querySelector('#threatInspector .badge');

        }
    } catch (e) {
        showToast('요청 실패: 서버 통신 실패', 'danger');
    }
}

async function blockIp(dbId, ip) {
    if (!confirm(`[경고] 출발지 IP (${ip}) 를 전사 방화벽 단에서 즉시 차단하시겠습니까?`)) return;
    try {
        const res = await fetch(`/api/threats/${dbId}/block`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
            showToast(`IP ${ip} 차단 정책을 배포했습니다.`, 'success');
            const activeRow = document.querySelector(`.threat-feed-item[data-id="${dbId}"]`);
            if (activeRow) activeRow.dataset.status = 'blocked';
            const statusBadge = document.querySelector('#threatInspector .badge');
            if (statusBadge) { statusBadge.innerText = '차단됨'; statusBadge.className = 'badge success'; }
        } else {
            showToast(data.message || '차단 정책 실현에 실패했습니다.', 'danger');
        }
    } catch (e) {
        showToast('차단 요청 통신 중 오류가 발생했습니다.', 'danger');
    }
}

async function whitelistIp(dbId) {
    if (!confirm('이 이벤트를 오탐 예외로 등록하시겠습니까?\n동일 IP의 패킷 통과를 임시 수용합니다.')) return;

async function isolateAgent(agentName) {
    if (!confirm(`에이전트 단말 [${agentName}]이(가) 침해되었을 가능성이 있습니다.\n조사 목적으로 해당 단말의 외부 네트워크를 영구 격리하시겠습니까?`)) return;
    try {
        const res = await fetch(`/api/agents/isolate/${encodeURIComponent(agentName)}`, { method: 'POST' });
        const data = await res.json();

function copyPayload() {
    const text = document.getElementById('jsonPayload').innerText;
    navigator.clipboard.writeText(text).then(() => {
        showToast('Raw JSON 페이로드가 클립보드에 복사되었습니다.', 'success');
    });
}

function showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = `cyber-toast ${type}`;
    let icon = 'info';
    if (type === 'success') icon = 'check-circle';
    else if (type === 'danger') icon = 'shield-alert';
    else if (type === 'warning') icon = 'alert-triangle';
    toast.innerHTML = `<i data-lucide="${icon}" size="16"></i><span>${DOMPurify.sanitize(message)}</span>`;
    container.appendChild(toast);
    if (typeof lucide !== 'undefined') lucide.createIcons();
    setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease-in reverse forwards';
        setTimeout(() => toast.remove(), 300);
    }, 4000);
}
