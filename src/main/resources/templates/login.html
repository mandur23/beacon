<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>로그인 · Beacon</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="login-body">
<div class="login-wrap">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon-lg">🛡</div>
            <div class="login-title">BEACON</div>
            <div class="login-sub">SECURITY ADMIN CONSOLE</div>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            로그아웃 되었습니다.
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="username" placeholder="admin" required autocomplete="username"/>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
            </div>
            <button type="submit" class="btn-login">로그인</button>
        </form>

        <div class="login-hint">기본 계정: admin / admin1234</div>
    </div>
</div>
</body>
</html>
