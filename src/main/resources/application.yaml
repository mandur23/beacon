server:
  port: 8080
  ssl:
    enabled: ${SERVER_SSL_ENABLED:true}
    key-store: ${SERVER_SSL_KEYSTORE_PATH:classpath:keystore.p12}
    key-store-password: ${SERVER_SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${SERVER_SSL_KEYSTORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:1}

spring:
  application:
    name: beacon

  datasource:
    url: ${BEACON_DB_URL:jdbc:mysql://localhost:3306/beacon?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${BEACON_DB_USERNAME:root}
    password: ${BEACON_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${BEACON_DB_POOL_SIZE:25}
      minimum-idle: ${BEACON_DB_POOL_MIN_IDLE:5}
      connection-timeout: ${BEACON_DB_CONNECTION_TIMEOUT_MS:30000}
      leak-detection-threshold: ${BEACON_DB_LEAK_DETECTION_MS:0}
      data-source-properties:
        rewriteBatchedStatements: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: true

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

jwt:
  secret: ${BEACON_JWT_SECRET}
  expiration: ${BEACON_JWT_EXPIRATION:86400000}

ml:
  python:
    service:
      url: ${ML_SERVICE_URL:http://localhost:5000}

ai:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.2:3b}
    auto-install: ${OLLAMA_AUTO_INSTALL:false}
    allow-auto-install: ${OLLAMA_ALLOW_AUTO_INSTALL:false}
    auto-bootstrap: ${OLLAMA_AUTO_BOOTSTRAP:true}
    docker:
      enabled: ${OLLAMA_DOCKER_ENABLED:false}
      auto-start: ${OLLAMA_DOCKER_AUTO_START:false}
      container-name: ${OLLAMA_DOCKER_CONTAINER_NAME:beacon-ollama}
      image: ${OLLAMA_DOCKER_IMAGE:ollama/ollama:latest}
      volume: ${OLLAMA_DOCKER_VOLUME:}

syslog:
  port: ${SYSLOG_PORT:514}
  protocol: UDP

suricata:
  eve:
    enabled: ${SURICATA_EVE_ENABLED:false}
    path: ${SURICATA_EVE_PATH:C:\\Program Files\\Suricata\\log\\eve.json}
    poll-interval-ms: ${SURICATA_EVE_POLL_MS:500}

logging:
  level:
    com.example.beacon: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}

guardian:
  correlation:
    admin-source-ips:
      - 192.168.1.10
    admin-destination-ips: []
    ignored-event-types:
      - biometric_anomaly
    ignored-agent-names:
      - suricata-local
    local-loopback-ips:
      - 127.0.1.1
      - 127.0.0.1
    rpi-guardian-source-ips:
      - 192.168.1.10
      - 127.0.1.1
      - 127.0.0.1
    ignored-rpi-guardian-destination-ips: []
    ignored-description-keywords:
      - ids_http
      - ids_fileinfo
      - python basehttp serverbanner
      - /api/health
      - /api/model/status
      - /static/
      - misc activity
    defense-evasion-indicators:
      - agent_offline
      - heartbeat lost
      - beacon stop
      - disable
    wazuh:
      preserve-level-min: 10
      critical-level-min: 12
      high-level-min: 10
      medium-level-min: 5
      low-risk-floor: 15.0
      medium-risk-floor: 50.0
      high-risk-floor: 80.0
      critical-risk-floor: 95.0

beacon:
  firewall:
    channel-mode: ${BEACON_FIREWALL_CHANNEL_MODE:DUAL}
    command-retention-days: ${BEACON_FIREWALL_CMD_RETENTION_DAYS:14}
    long-poll:
      core-pool-size: ${BEACON_FIREWALL_LP_CORE:16}
      max-pool-size: ${BEACON_FIREWALL_LP_MAX:64}
      queue-capacity: ${BEACON_FIREWALL_LP_QUEUE:500}
