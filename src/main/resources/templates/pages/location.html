<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::body/content})}">
<body>
<content>

<!-- Hero Section -->
<div class="hero-section" style="padding: 32px 24px; border-bottom: 1px solid var(--glass-border);">
    <div class="hero-content">
        <h2 style="font-family:var(--font-title); font-size:28px; font-weight:800; color:#fff;">실시간 위치 관제 시스템</h2>
        <p style="color:var(--dim); margin-top:8px;">사용자 실시간 추적 및 전 세계 보안 위협 발원지를 시각화합니다.</p>
    </div>
    <div class="hero-scan-line"></div>
</div>

<!-- Main Content Grid -->
<div style="display: grid; grid-template-columns: 350px 1fr; gap: 24px; margin: 24px;">
    
    <div style="display: flex; flex-direction: column; gap: 24px;">
        <!-- GeoIP Information Card -->
        <div class="glass-card premium-glass">
            <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
                <div class="card-title">네트워크 인텔리전스</div>
                <button id="btnPreciseLocation" class="btn-accent" style="padding: 6px 12px; font-size: 11px; cursor:pointer; display:flex; align-items:center;">
                    <i data-lucide="crosshair" size="14" style="margin-right:4px;"></i>실시간 추적 시작
                </button>
            </div>
            <div style="padding: 24px; display:flex; flex-direction:column; gap:12px;" id="geoInfo">
                <div style="display:flex; align-items:center; gap:8px; color:var(--dim);">
                    <i data-lucide="loader" class="spin"></i> 위치 분석 중...
                </div>
            </div>
        </div>

        <!-- Recent Threats List Card -->
        <div class="glass-card premium-glass" style="flex: 1; display: flex; flex-direction: column;">
            <div class="card-header">
                <div class="card-title">최근 탐지된 위협 위치</div>
            </div>
            <div style="padding: 16px; overflow-y: auto; flex: 1; max-height: 350px;" id="threatList">
                <div style="text-align: center; padding: 20px; color: var(--dim);">위협 데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>

    <!-- Map Visualization Card -->
    <div class="glass-card premium-glass" style="height: 100%;">
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="card-title">지리적 위협 시각화 가시성</div>
            <div style="display: flex; gap: 12px;">
                <span class="badge-network" style="font-size: 10px;">● 사용자</span>
                <span class="badge" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); font-size: 10px;">● 공격자</span>
            </div>
        </div>
        <div style="padding: 20px; height: calc(100% - 60px);">
            <div id="map" style="height: 600px; border-radius: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border);">
            </div>
        </div>
    </div>
</div>

<!-- Leaflet.js Dependencies -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    .attacker-pulse {
        width: 12px; height: 12px; background: var(--danger);
        border-radius: 50%; box-shadow: 0 0 10px var(--danger);
        animation: attacker-glow 1.5s infinite;
    }
    @keyframes attacker-glow {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        70% { transform: scale(1.2); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
    .threat-item {
        padding: 12px; border-bottom: 1px solid var(--glass-border);
        transition: background 0.2s; cursor: pointer;
    }
    .threat-item:hover { background: rgba(255,255,255,0.05); }
</style>

<script>
    let map = null;
    let userMarker = null;
    let watchId = null;
    let attackerMarkers = [];
    const geocodeCache = new Map();

    document.addEventListener('DOMContentLoaded', async () => {
        // Initialize Map
        initMap(37.5665, 126.9780); // Default to Seoul

        // Initial GeoIP check
        await fetchInitialGeo();
        
        // Fetch and Render Attackers
        await updateAttackers();
        setInterval(updateAttackers, 30000); // Update every 30 seconds
    });

    async function fetchInitialGeo() {
        const geoInfo = document.getElementById('geoInfo');
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            if (data.error) throw new Error(data.reason);

            renderGeoInfo(data.ip, `${data.country_name} (${data.country})`, `${data.region}, ${data.city}`, data.org || '알 수 없음', data.latitude, data.longitude, data.timezone, 'GeoIP IP 추정');
            updateUserMarker(data.latitude, data.longitude, `<b style="color:#000;">GeoIP 추정 위치</b><br>${data.city}, ${data.country_name}`);
            map.setView([data.latitude, data.longitude], 12);
        } catch (error) {
            geoInfo.innerHTML = `<div class="danger">데이터 조회 실패: ${error.message}</div>`;
        }
    }

    function renderGeoInfo(ip, country, region, isp, lat, lon, tz, sourceType) {
        document.getElementById('geoInfo').innerHTML = `
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--glass-border); padding-bottom:10px;">
                <span class="dim">위치 측정 방식</span>
                <span class="success" style="font-weight:600;">${sourceType}</span>
            </div>
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--glass-border); padding-bottom:10px;">
                <span class="dim">Public IP</span>
                <span class="accent mono" style="font-weight:600;">${ip || '확인 불가'}</span>
            </div>
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--glass-border); padding-bottom:10px;">
                <span class="dim">국가 / 지역</span>
                <span style="font-weight:500;">${country || '-'} / ${region || '-'}</span>
            </div>
            <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--glass-border); padding-bottom:10px;">
                <span class="dim">좌표 (Lat, Lon)</span>
                <span class="mono">${lat}, ${lon}</span>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <span class="dim">ISP / 회선</span>
                <span style="font-weight:500; font-size:11px; text-align:right;">${isp || '-'}</span>
            </div>
        `;
    }

    function initMap(lat, lon) {
        if (!map) {
            map = L.map('map', { zoomControl: false }).setView([lat, lon], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
        }
    }

    function updateUserMarker(lat, lon, popupText) {
        if (userMarker) map.removeLayer(userMarker);
        
        const userIcon = L.divIcon({
            html: '<div style="background:var(--accent); width:18px; height:18px; border-radius:50%; border:3px solid #fff; box-shadow:0 0 15px var(--accent);"></div>',
            className: 'custom-user-icon',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
        });

        userMarker = L.marker([lat, lon], {icon: userIcon}).addTo(map);
        if (popupText) userMarker.bindPopup(popupText);
    }

    // --- Continuous User Tracking ---
    document.getElementById('btnPreciseLocation').addEventListener('click', () => {
        const btn = document.getElementById('btnPreciseLocation');
        
        if (watchId !== null) {
            // Stop Tracking
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            btn.innerHTML = `<i data-lucide="crosshair" size="14" style="margin-right:4px;"></i>실시간 추적 시작`;
            btn.classList.remove('btn-danger');
            btn.classList.add('btn-accent');
            if (typeof lucide !== 'undefined') lucide.createIcons();
            return;
        }

        // Start Tracking
        btn.innerHTML = `<i data-lucide="loader" class="spin" style="margin-right:4px;"></i>추적 중... (중지)`;
        btn.classList.remove('btn-accent');
        btn.classList.add('btn-danger');
        if (typeof lucide !== 'undefined') lucide.createIcons();

        if (!navigator.geolocation) {
            alert('브라우저가 위치 정보를 지원하지 않습니다.');
            return;
        }

        watchId = navigator.geolocation.watchPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                renderGeoInfo('-', '-', '실시간 GPS 데이터', '-', lat.toFixed(5), lon.toFixed(5), '-', 'GPS 정밀 추적 중');
                updateUserMarker(lat, lon, `<b style="color:#000;">현재 정밀 위치</b><br>실시간 추적 활성화됨`);
                map.flyTo([lat, lon], 16);
            },
            (err) => {
                console.error(err);
                alert("위치 정보를 가져오는 데 실패했습니다.");
            },
            { enableHighAccuracy: true }
        );
    });

    // --- Attacker Visualization ---
    async function updateAttackers() {
        try {
            const res = await fetch('/api/security-events?size=20&sortBy=id&direction=DESC');
            const data = await res.json();
            const events = data.content || [];
            
            const threatList = document.getElementById('threatList');
            threatList.innerHTML = '';
            
            // Clear existing markers
            attackerMarkers.forEach(m => map.removeLayer(m));
            attackerMarkers = [];

            const processedIps = new Set();

            for (const event of events) {
                if (processedIps.has(event.sourceIp)) continue;
                processedIps.add(event.sourceIp);

                // Add to List
                const item = document.createElement('div');
                item.className = 'threat-item';
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <span style="font-size:12px; font-weight:700; color:var(--danger);">${event.eventType}</span>
                        <span class="mono" style="font-size:10px; color:var(--dim);">${event.sourceIp}</span>
                    </div>
                    <div style="font-size:11px; color:var(--dim); margin-top:4px;">${event.location || '위치 정보 없음'}</div>
                `;
                threatList.appendChild(item);

                // Geocode IP if not in cache
                let coords = geocodeCache.get(event.sourceIp);
                if (!coords) {
                    try {
                        const geoRes = await fetch(`https://ipapi.co/${event.sourceIp}/json/`);
                        const geoData = await geoRes.json();
                        if (geoData.latitude && geoData.longitude) {
                            coords = [geoData.latitude, geoData.longitude];
                            geocodeCache.set(event.sourceIp, coords);
                        }
                    } catch (e) { console.error("Geocoding failed for", event.sourceIp); }
                }

                if (coords) {
                    const attackerIcon = L.divIcon({
                        html: '<div class="attacker-pulse"></div>',
                        className: 'custom-attacker-icon',
                        iconSize: [12, 12],
                        iconAnchor: [6, 6]
                    });

                    const marker = L.marker(coords, { icon: attackerIcon }).addTo(map);
                    marker.bindPopup(`
                        <div style="color:#000;">
                            <b style="color:var(--danger)">[위협 탐지]</b><br>
                            <b>IP:</b> ${event.sourceIp}<br>
                            <b>유형:</b> ${event.eventType}<br>
                            <b>위험도:</b> ${event.severity}
                        </div>
                    `);
                    attackerMarkers.push(marker);
                    
                    item.onclick = () => {
                        map.flyTo(coords, 8);
                        marker.openPopup();
                    };
                }
            }
            
            if (events.length === 0) {
                threatList.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--dim);">최근 위협 데이터가 없습니다.</div>';
            }
        } catch (e) {
            console.error("Failed to update attackers", e);
        }
    }

    if (typeof lucide !== 'undefined') lucide.createIcons();
</script>
</content>
</body>
</html>

</content>
</body>
</html>
